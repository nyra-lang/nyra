name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-all:
    name: make test-all
    runs-on: ubuntu-latest
    env:
      TEST_SAN: "1"
      TEST_PERF: "1"
      TEST_FUZZ: "1"
      NYRA_SUITE_PROFILE: ci
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install nightly (fuzz smoke)
        run: rustup toolchain install nightly

      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-v1

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld libclang-dev llvm-dev libsqlite3-dev wasi-libc python3 \
            g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64

      - name: Full Nyra test suite (incl. sanitizer + perf + fuzz + cross)
        run: make test-all

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM (clang for nyra build)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1.8"

      - name: Windows core Nyra tests
        shell: bash
        run: make test-all-windows

      - name: Package smoke (Windows asset layout)
        shell: bash
        run: make package-release VERSION=1.1.0-test TRIPLE=x86_64-pc-windows-msvc

      - name: DAP smoke
        run: cargo build -p nyra-dap

  benchmark:
    name: make bench (quick)
    runs-on: ubuntu-latest
    needs: test-all
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld libclang-dev llvm-dev golang nodejs python3

      - name: Cross-language benchmark (quick subset)
        env:
          BENCH_QUICK: "1"
          BENCH_RUNS: "3"
          BENCH_SKIP_PGO: "1"
          BENCH_LANG_COOLDOWN: "0"
          BENCH_SERVE: "0"
          BENCH_NO_OPEN: "1"
          BENCH_UPDATE_README: "0"
        run: make bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            examples/comparison/results/latest.txt
            examples/comparison/results/latest.html
            examples/comparison/results/data.tsv

  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install nightly
        run: rustup toolchain install nightly

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld libclang-dev llvm-dev python3

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Regenerate full compiletest profile
        run: make gen-suite-tests GEN_SUITE_ARGS="--profile full"

      - name: Full compiletest suite
        run: cargo test -p compiler suite_ -- --nocapture

      - name: Extended fuzz gate (longer than push CI)
        run: make test-fuzz-nightly
