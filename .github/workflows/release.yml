name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin
          - os: macos-latest  
            triple: x86_64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - name: Cache x86_64 LLVM (macOS cross-build)
        if: runner.os == 'macOS' && matrix.triple == 'x86_64-apple-darwin'
        uses: actions/cache@v4
        with:
          path: ~/clang+llvm-15.0.7-x86_64-apple-darwin21.0
          key: llvm-macos-x86_64-15.0.7

      - name: Install clang (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y clang zip libclang-dev llvm-dev
          elif [ "${{ runner.os }}" = "macOS" ]; then
            bash make/lib/install-release-llvm.sh "${{ matrix.triple }}"
          fi
      - name: Package release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make package-release VERSION="$VERSION" TRIPLE="${{ matrix.triple }}"
      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: nyra-${{ matrix.triple }}
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: SHA256SUMS
        run: |
          cd dist
          shasum -a 256 nyra-* > SHA256SUMS 2>/dev/null || sha256sum nyra-* > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true